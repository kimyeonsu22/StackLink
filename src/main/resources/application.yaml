server:
  port: 8080

spring:
  application:
    name: StackLink

  datasource:
    url: jdbc:mysql://localhost:3306/stacklink?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  # ===== 소셜 로그인 (구글/카카오/네이버) =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 구글_CLIENT_ID_여기에
            client-secret: 구글_CLIENT_SECRET_여기에
            scope: profile, email
          kakao:
            client-id: 카카오_CLIENT_ID_여기에
            client-secret: 카카오_CLIENT_SECRET_여기에
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
          naver:
            client-id: 네이버_CLIENT_ID_여기에
            client-secret: 네이버_CLIENT_SECRET_여기에
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: nickname, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# ===== JWT =====
jwt:
  secret: change-this-to-a-long-random-secret-at-least-32-characters
  access-token-validity: 1800000       # 30분 (ms)
  refresh-token-validity: 1209600000   # 14일 (ms)

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE
    org.springframework.web: DEBUG
